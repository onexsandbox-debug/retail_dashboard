<!DOCTYPE html>
<html>
<head>
  <title>Retail Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f4f6f9;
      display: flex;
      font-size: 13px;
    }

    .sidebar {
      width: 240px;
      background: white;
      height: 100vh;
      border-right: 1px solid #eee;
    }

    .logo {
      padding: 15px 20px;
    }

    .logo img {
      max-width: 140px;
    }

    .menu {
      padding: 10px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 6px;
    }

    .menu div:hover {
      background: #f5f5f5;
    }

    .active {
      background: #ffe6e6;
      color: #e60023;
      font-weight: 600;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logout-btn {
      background: #c62828;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .btn-refresh {
      background: #1f4e8c;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .upload-box {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: #D56269;
      background: #fff7f7;
    }

    .upload-box.dragover {
      border-color: #D56269;
      background: #ffeaea;
    }

    .upload-icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .file-name {
      margin-top: 10px;
      font-weight: 600;
      color: #333;
    }

    .btn-upload {
      margin-top: 15px;
      padding: 10px 14px;
      background: #D56269;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #errorModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "/login.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg">
  </div>

  <div class="menu">
    <div class="active" onclick="switchTab('upload', this)">Upload</div>
    <div onclick="switchTab('store', this)">Nearest Store</div>
    <div onclick="switchTab('offer', this)">Offer</div>
    <div onclick="switchTab('loyalty', this)">Loyalty Points</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h3 id="sectionTitle">Upload Center</h3>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="filters">
    <input type="text" placeholder="Search">
    <input type="date">
    <button class="btn-refresh" onclick="refreshData()">Refresh</button>
  </div>

  <div class="card">

    <!-- UPLOAD -->
    <div id="uploadSection">
      <h3>Upload PDF</h3>

      <div class="upload-box" id="dropZone">
        <div class="upload-icon">📄</div>
        <div>Drag & Drop PDF here</div>
        <small>or click to browse</small>
        <input type="file" id="pdfFile" hidden>
        <div id="fileName" class="file-name"></div>
      </div>

      <button class="btn-upload" onclick="uploadPDF()">Upload</button>

      <div id="uploadProgressContainer" style="display:none; margin-top:15px;">
        <div style="font-size:12px;">
          Uploading... <span id="progressText">0%</span>
        </div>
        <div style="width:100%; height:8px; background:#eee;">
          <div id="progressBar" style="height:100%; width:0%; background:#D56269;"></div>
        </div>
      </div>

      <p id="result"></p>
    </div>

    <!-- DATA -->
    <div id="dynamicContent" style="display:none;"></div>

  </div>
</div>

<!-- ERROR -->
<div id="errorModal">
  <div class="modal-box">
    <p id="errorText"></p>
    <button onclick="closeError()" class="btn-upload">OK</button>
  </div>
</div>

<script src="/js/upload.js"></script>

<script>

// =============================
// 🔥 DATA LOAD FIX
// =============================
async function loadData(type) {

  const dynamic = document.getElementById("dynamicContent");

  let api = {
    store: "getStoreVisit",
    offer: "getOfferVisit",
    loyalty: "getLoyaltyVisit"
  }[type];

  try {
    const res = await fetch(`/api/${api}?page=1&limit=10`);
    const json = await res.json();

    if (!json.success) {
      dynamic.innerHTML = "No data found";
      return;
    }

    let html = `<table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Mobile</th>
          <th>WABA</th>
          <th>Date</th>
          <th>Time</th>
        </tr>
      </thead><tbody>`;

    json.data.forEach((row, i) => {
      const d = new Date(row.created_at);

      html += `
        <tr>
          <td>${i + 1}</td>
          <td>${row.mobile_number}</td>
          <td>${row.waba_number}</td>
          <td>${d.toLocaleDateString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
          <td>${d.toLocaleTimeString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
        </tr>`;
    });

    html += "</tbody></table>";
    dynamic.innerHTML = html;

  } catch {
    dynamic.innerHTML = "Error loading data";
  }
}

// =============================
function switchTab(tab, el) {

  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  const upload = document.getElementById("uploadSection");
  const dynamic = document.getElementById("dynamicContent");

  if (tab === "upload") {
    upload.style.display = "block";
    dynamic.style.display = "none";
    return;
  }

  upload.style.display = "none";
  dynamic.style.display = "block";
  dynamic.innerHTML = "Loading...";

  loadData(tab);
}

// =============================
function refreshData() {
  const active = document.querySelector(".menu .active").innerText.toLowerCase();

  if (active.includes("store")) loadData("store");
  if (active.includes("offer")) loadData("offer");
  if (active.includes("loyalty")) loadData("loyalty");
}

// =============================
function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login.html";
}

// =============================
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("pdfFile");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = () => {
  document.getElementById("fileName").innerText = fileInput.files[0].name;
};

dropZone.ondragover = e => {
  e.preventDefault();
  dropZone.classList.add("dragover");
};

dropZone.ondragleave = () => dropZone.classList.remove("dragover");

dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  fileInput.files = e.dataTransfer.files;
  document.getElementById("fileName").innerText = e.dataTransfer.files[0].name;
};

</script>

</body>
</html>
