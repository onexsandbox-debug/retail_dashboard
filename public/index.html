<!DOCTYPE html>
<html>
<head>
  <title>Retail Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Manrope'; background:#f4f6f9; display:flex; font-size:13px; }
    .sidebar { width:240px; background:white; height:100vh; border-right:1px solid #eee; }
    .logo { padding:15px 20px; }
    .logo img { max-width:140px; }
    .menu { padding:10px; }
    .menu div { padding:12px; margin-bottom:5px; cursor:pointer; border-radius:6px; }
    .menu div:hover { background:#f5f5f5; }
    .active { background:#ffe6e6; color:#e60023; font-weight:600; }
    .main { flex:1; padding:20px; }
    .header { display:flex; justify-content:space-between; margin-bottom:20px; }
    .logout-btn { background:#c62828; color:white; border:none; padding:8px 12px; border-radius:6px; }

    .filters { display:flex; gap:10px; margin-bottom:15px; background:white; padding:15px; border-radius:10px; }

    .card { background:white; padding:20px; border-radius:10px; }

    table { width:100%; border-collapse:collapse; }
    th { background:#f5f6fa; padding:12px; text-align:left; }
    td { padding:10px; border-bottom:1px solid #eee; }

    .status {
      background:#e6f4ea;
      color:#1e7e34;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
    }

    .pagination {
      margin-top:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg">
  </div>

  <div class="menu">
    <div class="active" onclick="switchTab('upload', this)">Upload</div>
    <div onclick="switchTab('store', this)">Nearest Store</div>
    <div onclick="switchTab('offer', this)">Offer</div>
    <div onclick="switchTab('loyalty', this)">Loyalty Points</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <h3 id="sectionTitle">Upload Center</h3>
    <button class="logout-btn">Logout</button>
  </div>

  <div class="filters">
    <input id="mobileFilter" type="text" placeholder="Mobile">
    <select id="limitSelect" onchange="refreshData()">
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30">30</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
    <button onclick="refreshData()">Refresh</button>
  </div>

  <div class="card">

    <div id="uploadSection">Upload Section</div>

    <div id="dynamicContent" style="display:none;"></div>

  </div>

</div>

<script>

let currentPage = 1;
let currentTab = "store";

// =============================
async function loadData(type) {

  currentTab = type;

  const mobile = document.getElementById("mobileFilter").value;
  const limit = document.getElementById("limitSelect").value;

  const dynamic = document.getElementById("dynamicContent");

  let api = {
    store: "getStoreVisit",
    offer: "getOfferVisit",
    loyalty: "getLoyaltyVisit"
  }[type];

  document.getElementById("sectionTitle").innerText =
    type === "store" ? "Nearest Store" :
    type === "offer" ? "Offer" : "Loyalty Points";

  const res = await fetch(`/api/${api}?page=${currentPage}&limit=${limit}&mobile=${mobile}`);
  const json = await res.json();

  if (!json.success) {
    dynamic.innerHTML = "No data";
    return;
  }

  let html = `
  <table>
    <thead>
      <tr>
        <th>S.No</th>
        <th>Mobile</th>
        <th>WABA</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
  `;

  json.data.forEach((row, i) => {

    const d = new Date(row.created_at);

    html += `
      <tr>
        <td>${(currentPage - 1) * limit + i + 1}</td>
        <td>${row.mobile_number}</td>
        <td>${row.waba_number}</td>
        <td>${d.toLocaleDateString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
        <td>${d.toLocaleTimeString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
        <td><span class="status">Verified</span></td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  // =============================
  // PAGINATION UI
  // =============================
  html += `
  <div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span>Page ${currentPage}</span>
    <button onclick="nextPage()">Next</button>
  </div>
  `;

  dynamic.innerHTML = html;
}


// =============================
function nextPage() {
  currentPage++;
  loadData(currentTab);
}

function prevPage() {
  if (currentPage > 1) currentPage--;
  loadData(currentTab);
}

// =============================
function switchTab(tab, el) {

  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("uploadSection").style.display = tab === "upload" ? "block" : "none";
  document.getElementById("dynamicContent").style.display = tab === "upload" ? "none" : "block";

  if (tab !== "upload") {
    currentPage = 1;
    loadData(tab);
  }
}

// =============================
function refreshData() {
  currentPage = 1;
  loadData(currentTab);
}

</script>

</body>
</html>
