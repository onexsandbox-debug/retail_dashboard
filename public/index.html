<!DOCTYPE html>
<html>
<head>
  <title>Retail Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f4f6f9;
      display: flex;
      font-size: 13px;
    }

    .sidebar {
      width: 240px;
      background: white;
      height: 100vh;
      border-right: 1px solid #eee;
    }

    .logo {
      padding: 15px 20px;
    }

    .logo img {
      max-width: 140px;
    }

    .menu {
      padding: 10px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 6px;
    }

    .menu div:hover {
      background: #f5f5f5;
    }

    .active {
      background: #ffe6e6;
      color: #e60023;
      font-weight: 600;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logout-btn {
      background: #c62828;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      flex-wrap: wrap;
    }

    .filters input, .filters select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-filter { background: #ff7a00; color: white; }
    .btn-refresh { background: #1f4e8c; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #f5f7fb;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .section {
      display: none;
    }

    .active-section {
      display: block;
    }

    .pagination {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg">
  </div>

  <div class="menu">
    <div class="active" onclick="switchTab('upload', this)">Upload</div>
    <div onclick="switchTab('store', this)">Nearest Store</div>
    <div onclick="switchTab('offer', this)">Offer</div>
    <div onclick="switchTab('loyalty', this)">Loyalty Points</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <h3 id="title">Upload Center</h3>
    <button class="logout-btn">Logout</button>
  </div>

  <!-- FILTER -->
  <div class="filters">
    <input type="text" id="mobile" placeholder="Mobile">
    <button class="btn btn-filter" onclick="loadData()">Filter</button>

    <select id="limit" onchange="changeLimit()">
      <option>10</option>
      <option>20</option>
      <option>30</option>
      <option>50</option>
      <option>100</option>
    </select>

    <button class="btn btn-refresh" onclick="loadData()">Refresh</button>
  </div>

  <!-- UPLOAD -->
  <div id="upload" class="section active-section">
    <input type="file" id="pdfFile">
    <button onclick="uploadPDF()">Upload</button>
  </div>

  <!-- DATA -->
  <div id="dataSection" class="section">
    <div id="tableContainer"></div>
  </div>

</div>

<script>

let currentTab = 'upload';
let page = 1;
let limit = 10;

// ======================
function switchTab(tab, el) {

  currentTab = tab;
  page = 1;

  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(e => e.classList.remove("active-section"));

  if (tab === 'upload') {
    document.getElementById("upload").classList.add("active-section");
    document.getElementById("title").innerText = "Upload Center";
  } else {
    document.getElementById("dataSection").classList.add("active-section");

    document.getElementById("title").innerText =
      tab === "store" ? "Nearest Store" :
      tab === "offer" ? "Offer" :
      "Loyalty Points";

    loadData();
  }
}

// ======================
async function loadData() {

  if (currentTab === 'upload') return;

  const mobile = document.getElementById("mobile").value;

  let api = {
    store: "getStoreVisit",
    offer: "getOfferVisit",
    loyalty: "getLoyaltyVisit"
  }[currentTab];

  const res = await fetch(`/api/${api}?page=${page}&limit=${limit}&mobile=${mobile}`);
  const json = await res.json();

  renderTable(json.data || []);
}

// ======================
function renderTable(data) {

  let html = `
  <table>
    <thead>
      <tr>
        <th>S.No</th>
        <th>Mobile</th>
        <th>WABA</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
  `;

  data.forEach((row, i) => {

    const d = new Date(row.created_at);

    html += `
      <tr>
        <td>${(page-1)*limit + i + 1}</td>
        <td>${row.mobile_number}</td>
        <td>${row.waba_number}</td>
        <td>${d.toLocaleDateString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
        <td>${d.toLocaleTimeString("en-GB",{timeZone:"Asia/Kolkata"})}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  html += `
  <div class="pagination">
    <div>
      <button onclick="prev()">Prev</button>
      Page ${page}
      <button onclick="next()">Next</button>
    </div>
  </div>
  `;

  document.getElementById("tableContainer").innerHTML = html;
}

// ======================
function changeLimit() {
  limit = parseInt(document.getElementById("limit").value);
  page = 1;
  loadData();
}

function next() {
  page++;
  loadData();
}

function prev() {
  if (page > 1) {
    page--;
    loadData();
  }
}

</script>

</body>
</html>
